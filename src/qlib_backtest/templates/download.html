<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>股票数据下载</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        .download-section {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin: 15px 0;
        }

        .download-method {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }

        .method-card {
            flex: 1;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .method-card:hover {
            border-color: #007bff;
            box-shadow: 0 2px 8px rgba(0, 123, 255, 0.2);
        }

        .method-card h3 {
            color: #007bff;
            margin-top: 0;
        }

        .badge-new {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 5px;
        }

        .quick-trigger {
            background: #f8f9fa;
            border-left: 4px solid #28a745;
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
        }

        .quick-trigger h3 {
            margin-top: 0;
            color: #28a745;
        }

        .quick-buttons {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-info {
            background: #17a2b8;
            color: white;
        }

        .btn-info:hover {
            background: #138496;
        }

        .hint {
            color: #666;
            font-size: 13px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>股票数据下载</h1>
            <p>输入股票代码和时间范围，下载对应的 OHLCV 数据。</p>
            <nav>
                <a href="/">首页</a> |
                <a href="/download">下载股票数据</a> |
                <a href="/download-manager">📥 数据下载管理</a> |
                <a href="/backtest">执行回测</a>
            </nav>
        </header>

        <!-- 快速触发下载 -->
        <section class="download-section">
            <div class="quick-trigger">
                <h3>⚡ 快速触发数据更新 <span class="badge-new">新功能</span></h3>
                <p>一键更新最新数据，支持增量下载（只下载新数据）。</p>
                <div class="quick-buttons">
                    <a href="/download-manager" class="btn btn-success">
                        📥 打开下载管理器
                    </a>
                    <button class="btn btn-info" onclick="showQuickDownload()">
                        ⚡ 快速下载
                    </button>
                </div>
                <p class="hint">💡 推荐使用数据下载管理器获得完整的下载控制和状态监控</p>
            </div>
        </section>

        <!-- 手动下载部分 -->
        <section class="download-section">
            <h2>📊 手动下载数据</h2>
            <p>指定时间范围下载历史数据</p>

            {% if error %}
                <div class="alert">{{ error }}</div>
            {% endif %}

            <form method="post">
                <label for="stock_codes">股票代码</label>
                <input id="stock_codes" name="stock_codes" type="text" placeholder="例如：000001.SZ, 600000.SH" required />

                <label for="start_date">开始日期</label>
                <input id="start_date" name="start_date" type="date" required />

                <label for="end_date">结束日期</label>
                <input id="end_date" name="end_date" type="date" required />

                <label for="freq">数据频率</label>
                <select id="freq" name="freq">
                    <option value="day">日线</option>
                    <option value="week">周线</option>
                    <option value="month">月线</option>
                </select>

                <button type="submit">下载 CSV</button>
            </form>

            <p class="hint">提示：如果未安装 QLib，将使用模拟数据生成。</p>
        </section>

        <footer>
            <p>下载完成后，CSV 文件将直接保存到你的浏览器下载目录。</p>
        </footer>
    </div>

    <script>
        function showQuickDownload() {
            const codeInput = prompt('请输入要下载的股票代码(逗号分隔):\n例：000858.SZ, 000651.SZ', '000858.SZ, 000651.SZ');
            
            if (codeInput) {
                // 重定向到下载管理器，并填充股票代码
                window.location.href = '/download-manager?codes=' + encodeURIComponent(codeInput);
            }
        }
    </script>
</body>
</html>
